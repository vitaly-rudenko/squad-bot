payments:
  command:
    message:
      - '💸 {viewUrl}'
  notifications:
    saved:
      message:
        - '💸 {editor} has {action} a *{amount}* payment {description}'
        - '👤 Sender: *{sender}*'
        - '👤 Receiver: *{receiver}*'
        - '{debts}'
      description: '– {description}'
      action:
        create: recorded
        update: edited
      ingoingDebt: '⬅️ {name} now owes you *{amount}*'
      outgoingDebt: '➡️ You now owe *{amount}* to {name} – [pay]({payUrl})'
      checkDebts: '↔️ Check your debts: /debts'
    deleted:
      message:
        - '❌ 💸 {editor} has deleted a *{amount}* payment {description}'
        - '👤 Sender: *{sender}*'
        - '👤 Receiver: *{receiver}*'
      description: '– {description}'
receipts:
  command:
    message:
      - '📝 {viewUrl}'
  notifications:
    part: '💵 Your part: *{amount}*'
    saved:
      message:
        - '📝 {editor} has {action} [a *{amount}* receipt]({receiptUrl}) {description}'
        - '👤 Paid by *{payer}*'
        - '{part}'
        - '{debts}'
      description: '– {description}'
      action:
        create: recorded
        update: edited
      ingoingDebt: '⬅️ {name} now owes you *{amount}*'
      outgoingDebt: '➡️ You now owe *{amount}* to {name} – [pay]({payUrl})'
      checkDebts: '↔️ Check your debts: /debts'
    deleted:
      message:
        - '❌ 📝 {editor} has deleted a *{amount}* receipt {description}'
        - '👤 Paid by *{payer}*'
        - '{part}'
      description: '– {description}'
  actions:
    getPhoto: '📷 Get receipt photo'
    sendingPhoto: 'Sending photo...'
    failedToSendPhoto: '😓 Photo is no longer available\.'
users:
  command:
    start:
      message: 🎉 Welcome\! Your name, username and language have been saved\.
cards:
  command:
    message:
      - '💳 {viewUrl}'
debts:
  command:
    noDebts: '✅ You''re all good\!'
    ingoingDebt: '\- {name}: *{amount}*'
    ingoingDebtsOne: '⬅️ {name} owes you *{amount}*'
    ingoingDebtsMany:
      - '⬅️ Owed to you:'
      - '{debts}'
    outgoingDebt: '\- {name}: *{amount}* – [pay]({payUrl})'
    outgoingDebtsOne: '➡️ You owe *{amount}* to {name} – [pay]({payUrl})'
    outgoingDebtsMany:
      - '➡️ You owe:'
      - '{debts}'
rollCalls:
  command:
    message:
      - '📣 {viewUrl}'
  noOneToMention: '❌ No one to mention or the bot doesn''t have enough data about this chat'
  pollTitle: 'Choose an answer'
  pollTitleMultiselect: 'Choose answers'
  groupPollTitle: 'Choose an answer ({group}/{groups})'
  groupPollTitleMultiselect: 'Choose answers ({group}/{groups})'
  notApplicablePollOption: 'N/A'
  notification:
    - '*{sender}*: {message}'
    - ''
    - '{mentions}'
  mention:
    withUsername: '@{username}'
    withoutUsername: '[{name}]({profileUrl})'
links:
  command:
    message:
      - '{links}'
      - ''
      - '✏️ [Manage links]({viewUrl})'
    linksListItem: '[{label}]({url})'
    # js-yaml seems to escape characters like "\n", so this is a workaround
    linksListDelimiter: ['', '']
    noLinks:
      - '❌ There are no links in this group chat yet\.'
      - ''
      - '✏️ [Add a link]({viewUrl})'
export:
  receipts:
    command:
      message: '✅ Your export is ready'
      noReceipts: '❌ You don''t have any receipts'
    columns:
      date: 'Date (UTC)'
      description: 'Description'
      amount: 'Amount'
      payer: 'Payer'
    filenamePrefix: 'receipts'
admins:
  titles:
    command:
      message:
        - '🏷 {editUrl}'
socialLinkFix:
  enabled: '✅ Previews for Twitter, Instagram and YouTube links will now be fixed'
  disabled: '❌ Previews for Twitter, Instagram and YouTube links will no longer be fixed'
  actions:
    accept: '✅ Keep'
    reject: '❌ Delete'
pollAnswerNotifications:
  voted: '*{voter}* has voted in the poll: {pollOptions}'
  retracted: '*{voter}* has retracted their vote\.'
  pollOptionsListItem: '*{pollOption}*'
  pollOptionsListDelimiter: ', '
  unknownPollOption: 'unknown'
  enabled: '✅ Notifications for poll answers are now enabled'
  disabled: '❌ Notifications for poll answers are now disabled'
voiceTranscription:
  enabled: '✅ Voice transcription is now enabled'
  disabled: '❌ Voice transcription is now disabled'
  transcribing: 'Transcribing...'
  actions:
    accept: '✅ Keep'
    reject: '❌ Delete'
groupChatOnly: '❌ This command can only be executed in a group chat'
privateChatOnly: '❌ This command can only be executed in a private chat'
unknownUser: 'Unknown user'
messageWasDeleted: 'Message was deleted'
